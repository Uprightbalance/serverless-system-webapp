name: Full Serverless Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔐 Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ⚙️ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 🌍 Terraform Init
      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init

      # 🚀 Terraform Apply
      - name: Terraform Apply
        working-directory: terraform/environments/dev
        run: terraform apply -auto-approve

      # 📋 Show Terraform Outputs
      - name: Show Terraform Outputs
        working-directory: terraform/environments/dev
        run: terraform output

      # 🌐 Show Frontend URL
      - name: Show Frontend URL
        working-directory: terraform/environments/dev
        run: echo "Frontend URL: $(terraform output -raw frontend_url)"

      # 🔗 Show API URL
      - name: Show API URL
        working-directory: terraform/environments/dev
        run: echo "API URL: $(terraform output -raw api_gateway_url)"

      # 🔥 Extract Terraform Outputs for later steps
      - name: Get Terraform Outputs
        working-directory: terraform/environments/dev
        run: |
          API_URL=$(terraform output -raw api_gateway_url)
          S3_BUCKET=$(terraform output -raw frontend_bucket_name)
          DIST_ID=$(terraform output -raw cloudfront_distribution_id)

          echo "API_URL=$API_URL" >> $GITHUB_ENV
          echo "S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV
          echo "DIST_ID=$DIST_ID" >> $GITHUB_ENV

      # 🧠 Inject frontend environment
      - name: Create frontend .env.production
        run: |
          echo "VITE_API_BASE_URL=$API_URL" > mrbaffo-frontend/.env.production

      # 📦 Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: mrbaffo-frontend
        run: npm install

      # 🏗 Build frontend
      - name: Build frontend
        working-directory: mrbaffo-frontend
        run: npm run build

      # 📤 Upload frontend build to S3
      - name: Upload frontend to S3
        run: aws s3 sync mrbaffo-frontend/dist s3://$S3_BUCKET --delete

      # 🚀 Invalidate CloudFront Cache
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $DIST_ID \
            --paths "/*"
